name: Daily Rental Monitor

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: America/Sao_Paulo
      PYTHONIOENCODING: utf-8
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      RENTAL_PICKUP_LOCATION: Aeroporto de Porto Seguro
      RENTAL_PICKUP_DATE: 12/09/2026
      RENTAL_PICKUP_TIME: "14:00"
      RENTAL_RETURN_DATE: 19/09/2026
      RENTAL_RETURN_TIME: "11:00"
      HEADLESS: "true"
      TIMEZONE: America/Sao_Paulo
      PLAYWRIGHT_TIMEOUT_MS: "45000"
      MAX_RETRIES: "2"
      SCREENSHOT_FULL_PAGE: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run unit tests
        id: tests
        continue-on-error: true
        run: python -m pytest -q

      - name: Run rental monitor
        id: monitor
        continue-on-error: true
        run: python -m app.main

      - name: Upload logs and outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rental-monitor-artifacts-${{ github.run_number }}
          path: |
            logs/
            output/
          if-no-files-found: warn
          retention-days: 7

      - name: Fail workflow if tests or monitor failed
        if: steps.tests.outcome == 'failure' || steps.monitor.outcome == 'failure'
        run: exit 1
